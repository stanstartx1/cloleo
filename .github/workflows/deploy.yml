name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy with SSH Key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -euo pipefail
            
            echo "🚀 Deployment started at $(date)"
            
            cd /var/www/cloleo
            
            echo "== Pulling latest code =="
            git fetch origin main --depth=1
            git reset --hard origin/main
            git clean -fd
            
            echo "== Backend =="
            cd backend
            source venv/bin/activate || python3 -m venv venv && source venv/bin/activate
            pip install -r requirements.txt --quiet
            deactivate
            
            echo "== Frontend build =="
            cd ../frontend
            
            # === PARTIE CORRIGÉE AVEC MAPBOX ===
            echo "Setting up production environment..."
            
            # Supprime l'ancien .env.production et en crée un propre
            rm -f .env.production
            echo "REACT_APP_BACKEND_URL=https://cloleo.com" > .env.production
            echo "REACT_APP_MAPBOX_ACCESS_TOKEN=${{ secrets.REACT_APP_MAPBOX_ACCESS_TOKEN }}" >> .env.production
            
            # Installation et build
            npm ci --prefer-offline || npm install
            npm run build
            
            echo "✅ Frontend built successfully with HTTPS backend URL and Mapbox token"
            
            echo "== Restart services =="
            echo "Backend unit configuration:"
            systemctl show cloleo-backend \
              --property=ExecStart \
              --property=WorkingDirectory \
              --no-pager

            systemctl restart cloleo-backend
            systemctl is-active --quiet cloleo-backend

            # The public API must expose the route that was just deployed.
            # Do not report a successful deployment while an older service is running.
            if ! curl --fail --silent --show-error --retry 5 --retry-connrefused \
              https://cloleo.com/api/openapi.json | grep --quiet '"/auth-page-settings"'; then
              echo "ERROR: cloleo-backend is not serving the code from this deployment."
              exit 1
            fi

            if systemctl is-active --quiet apache2; then
              systemctl reload apache2
            else
              echo "Apache is not managed by the apache2 systemd unit; no reload performed."
            fi
            
            echo "✅ Deployment finished at $(date)"

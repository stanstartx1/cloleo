name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euxo pipefail
            cd /var/www/cloleo
            git pull origin main

            echo "== Backend dependencies =="
            source /var/www/cloleo/backend/venv/bin/activate
            python --version
            pip --version
            pip install -r /var/www/cloleo/backend/requirements.txt
            deactivate

            echo "== Frontend build =="
            cd /var/www/cloleo/frontend
            node -v
            npm -v
            npm ci || npm install
            npm run build

            echo "== Services =="
            systemctl restart cloleo-backend
            systemctl reload apache2
            echo "Deploy OK"

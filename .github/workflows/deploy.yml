name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy with SSH Key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -euo pipefail
            echo "🚀 Deployment started at $(date)"

            cd /var/www/cloleo

            echo "== Pulling latest code =="
            git fetch origin main --depth=1
            git reset --hard origin/main
            git clean -fd

            echo "== Backend =="
            cd backend
            source venv/bin/activate || echo "Venv failed"
            pip install -r requirements.txt --quiet || echo "Pip skipped"
            deactivate

            echo "== Frontend build =="
            cd ../frontend
            npm ci --prefer-offline || npm install
            npm run build

            echo "== Restart services =="
            systemctl restart cloleo-backend || echo "Backend warning"
            systemctl reload apache2 || echo "Apache warning"

            echo "✅ Deployment finished at $(date)"
name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euxo pipefail

            echo "== Sync code =="
            cd /var/www/cloleo
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "== Backend dependencies =="
            source /var/www/cloleo/backend/venv/bin/activate
            python --version
            pip --version
            pip install -r /var/www/cloleo/backend/requirements.txt
            deactivate

            echo "== Frontend build =="
            cd /var/www/cloleo/frontend
            node -v
            npm -v
            npm ci || npm install
            npm run build

            echo "== Services =="
            systemctl restart cloleo-backend
            systemctl reload apache2
            echo "Deploy OK"